<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>购买会员</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 40px 16px;
      color: #111827;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }

    select, input, button {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    select, input {
      border: 1px solid #d1d5db;
    }

    button {
      margin-top: 16px;
      border: none;
      background: #111827;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
    }

    .box {
      margin-top: 14px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      text-align: center;
    }

    .ok { color: #047857; }
    .warn { color: #b45309; }
    .danger { color: #b91c1c; }

    img {
      max-width: 220px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <h2>购买会员</h2>

  <label>选择产品</label>
  <select id="product">
    <option value="GPT">GPT</option>
    <option value="CLAUDE">Claude</option>
    <option value="VIP">VIP</option>
    <option value="MJ">MJ</option>
  </select>

  <div id="priceBox">价格：¥10</div>
  <div id="stockBox" class="ok">库存加载中...</div>

  <label>邮箱</label>
  <input id="email" placeholder="输入你的邮箱">

  <label>支付方式</label>
  <select id="payMethod">
    <option value="wechat">微信支付</option>
    <option value="alipay">支付宝</option>
    <option value="usdt">USDT / TRC20</option>
  </select>

  <div class="box" id="qrBox"></div>

  <button id="buyBtn" onclick="buy()">立即购买</button>

  <div id="statusBox" class="box">等待操作...</div>

</div>

<script>
const API_BASE = "https://membership-agent.onrender.com";

/* ===== 价格 ===== */
const PRICE_MAP = {
  GPT: 180,
  CLAUDE: 200,
  VIP: 300,
  MJ: 150
};

/* ===== DOM ===== */
const productSelect = document.getElementById("product");
const priceBox = document.getElementById("priceBox");
const stockBox = document.getElementById("stockBox");
const payMethod = document.getElementById("payMethod");
const qrBox = document.getElementById("qrBox");
const statusBox = document.getElementById("statusBox");
const buyBtn = document.getElementById("buyBtn");

/* ===== 更新价格 ===== */
function updatePrice(){
  const p = productSelect.value;
  priceBox.innerText = "价格：¥" + (PRICE_MAP[p] || 0);
}

/* ===== 加载库存 ===== */
async function loadStock(){
  try{
    const res = await fetch(`${API_BASE}/inventory/stats`);
    const data = await res.json();

    const p = productSelect.value;
    const item = data.items.find(i => i.product_code === p);

    const stock = item ? item.available : 0;

    if(stock <= 0){
      stockBox.innerHTML = `<span class="danger">库存不足，暂时无法购买</span>`;
      buyBtn.disabled = true;
    }else{
      stockBox.innerHTML = `<span class="ok">库存剩余：${stock}</span>`;
      buyBtn.disabled = false;
    }

  }catch(e){
    stockBox.innerHTML = `<span class="danger">库存加载失败</span>`;
  }
}

/* ===== 切换二维码 ===== */
function updateQR(){
  const method = payMethod.value;

  if(method === "wechat"){
    qrBox.innerHTML = `
      <div>微信支付</div>
      <img src="/static/qrcodes/wechat.png">
    `;
  }

  if(method === "alipay"){
    qrBox.innerHTML = `
      <div>支付宝</div>
      <img src="/static/qrcodes/alipay.png">
    `;
  }

  if(method === "usdt"){
    qrBox.innerHTML = `
      <div>USDT支付（自动生成）</div>
    `;
  }
}

/* ===== 创建订单 ===== */
async function buy(){
  const product = productSelect.value;
  const email = document.getElementById("email").value;
  const method = payMethod.value;

  if(!email){
    alert("请输入邮箱");
    return;
  }

  statusBox.innerText = "创建订单中...";

  try{
    const res = await fetch(`${API_BASE}/orders`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        product_code: product,
        customer_email: email
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.detail || "创建订单失败");
    }

    const orderNo = data.order_no;

    /* ===== 微信 / 支付宝 ===== */
    if(method === "wechat" || method === "alipay"){
      statusBox.innerHTML = `
        <div class="ok">
          订单创建成功：${orderNo}<br>
          请扫码付款，付款后后台自动发货
        </div>
      `;
      return;
    }

    /* ===== USDT ===== */
    const payRes = await fetch(`${API_BASE}/payments/checkout`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        order_no: orderNo,
        pay_currency:"usdttrc20"
      })
    });

    const payData = await payRes.json();

    if(!payRes.ok){
      throw new Error(payData.detail || "支付创建失败");
    }

    qrBox.innerHTML = `
      <div>USDT支付</div>
      <img src="${payData.qr_code_url}">
      <div>${payData.pay_address}</div>
    `;

    statusBox.innerHTML = `
      <div class="ok">
        请完成 USDT 支付<br>
        订单号：${orderNo}
      </div>
    `;

  }catch(e){
    statusBox.innerHTML = `<span class="danger">${e.message}</span>`;
  }
}

/* ===== 监听 ===== */
productSelect.addEventListener("change", ()=>{
  updatePrice();
  loadStock();
});

payMethod.addEventListener("change", updateQR);

/* ===== 初始化 ===== */
updatePrice();
loadStock();
updateQR();
</script>

</body>
</html>
