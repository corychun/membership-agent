<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI会员代充平台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  cursor:pointer;
}

.card.active{
  border:2px solid #6366f1;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:#fff;
  cursor:pointer;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.panel{
  background:#111827;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>AI会员一键购买</h1>
  <p>自动发货 · 支持微信/支付宝</p>
</div>

<div class="products" id="products"></div>

<div class="panel">
  <input id="email" placeholder="请输入邮箱">
  <button onclick="buy()">立即购买</button>
  <div id="status"></div>
</div>

</div>

<script>
const API="";

let product="GPT";

const products=[
 {code:"GPT",name:"ChatGPT Plus",price:180},
 {code:"CLAUDE",name:"Claude Pro",price:200}
];

const container=document.getElementById("products");

products.forEach(p=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h3>${p.name}</h3><div>¥${p.price}</div>`;
  div.onclick=()=>select(p.code,div);
  container.appendChild(div);
});

function select(code,el){
  product=code;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

async function buy(){
  const email=document.getElementById("email").value;

  const res=await fetch(API+"/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({product_code:product,customer_email:email})
  });

  const data=await res.json();

  document.getElementById("status").innerText="订单："+data.order_no;
}
</script>

<!-- ================= 客服系统 ================= -->

<div id="supportWidget" style="position:fixed;right:20px;bottom:20px;z-index:9999;">
  <button onclick="toggleSupport()" style="width:60px;height:60px;border-radius:50%;background:#6366f1;color:#fff;font-size:24px;">💬</button>

  <div id="supportBox" style="display:none;width:320px;height:450px;background:#fff;color:#000;border-radius:16px;margin-bottom:10px;overflow:hidden;">
    
    <div style="background:#111827;color:#fff;padding:10px;">
      在线客服
      <span style="float:right;cursor:pointer;" onclick="toggleSupport()">✖</span>
    </div>

    <div id="supportStart" style="padding:10px;">
      <input id="supportEmail" placeholder="邮箱">
      <textarea id="supportMsg" placeholder="请输入问题" style="width:100%;height:100px;"></textarea>
      <button onclick="startChat()">开始咨询</button>
    </div>

    <div id="chatBox" style="display:none;height:360px;flex-direction:column;">
      <div id="messages" style="height:300px;overflow:auto;padding:10px;"></div>
      <input id="chatInput" onkeydown="if(event.key==='Enter')sendMsg()" placeholder="输入消息">
    </div>

  </div>
</div>

<script>
let sessionNo=localStorage.getItem("sessionNo");
let ws=null;

function toggleSupport(){
  const box=document.getElementById("supportBox");
  box.style.display=box.style.display==="none"?"block":"none";
}

async function startChat(){
  const email=document.getElementById("supportEmail").value;
  const msg=document.getElementById("supportMsg").value;

  const res=await fetch("/support/sessions",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({customer_email:email,first_message:msg})
  });

  const data=await res.json();

  sessionNo=data.session.session_no;
  localStorage.setItem("sessionNo",sessionNo);

  openChat();
}

function openChat(){
  document.getElementById("supportStart").style.display="none";
  document.getElementById("chatBox").style.display="flex";

  ws=new WebSocket(`wss://${location.host}/ws/support/customer/${sessionNo}`);

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.message){
      addMsg(d.message.content);
    }
  };
}

function sendMsg(){
  const input=document.getElementById("chatInput");
  ws.send(JSON.stringify({content:input.value}));
  input.value="";
}

function addMsg(t){
  const div=document.createElement("div");
  div.innerText=t;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
