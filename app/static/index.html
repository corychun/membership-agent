<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI会员购买中心</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:38px;
}

.products{
  display:flex;
  gap:20px;
  justify-content:center;
  margin:40px 0;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  width:200px;
  cursor:pointer;
}

.card.active{
  border:2px solid #6366f1;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

#qr{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>AI会员一键购买</h1>
  <p>自动发货 · 支持微信 / 支付宝</p>

  <div class="products">
    <div class="card active" onclick="select('GPT',this)">
      <h3>ChatGPT Plus</h3>
      <p>¥180</p>
    </div>

    <div class="card" onclick="select('CLAUDE',this)">
      <h3>Claude Pro</h3>
      <p>¥200</p>
    </div>
  </div>

  <input id="email" placeholder="请输入邮箱">
  <button onclick="buy()">立即购买</button>

  <div id="qr"></div>
  <div id="status"></div>
</div>

<script>
let product="GPT";

function select(code,el){
  product=code;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

async function buy(){
  const email=document.getElementById("email").value;

  if(!email){
    alert("请输入邮箱");
    return;
  }

  const res=await fetch("/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      product_code:product,
      customer_email:email
    })
  });

  const data=await res.json();

  document.getElementById("status").innerText="订单："+data.order_no;

  document.getElementById("qr").innerHTML=`
    <p>扫码付款</p>
    <img src="/static/qrcodes/wechat.png" width="200">
  `;
}
</script>

<!-- 客服系统 -->
<div style="position:fixed;right:20px;bottom:20px;">
  <button onclick="toggleChat()" style="width:60px;height:60px;border-radius:50%;">💬</button>

  <div id="chatBox" style="display:none;width:300px;height:400px;background:#fff;color:#000;">
    <div style="background:#000;color:#fff;padding:10px;">客服</div>
    <div id="msgs" style="height:300px;overflow:auto;"></div>
    <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()">
  </div>
</div>

<script>
let ws;

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display=box.style.display==="none"?"block":"none";
}

function sendMsg(){
  const val=document.getElementById("msgInput").value;
  ws.send(JSON.stringify({content:val}));
}

function initChat(){
  ws=new WebSocket(`wss://${location.host}/ws/support/customer/demo`);

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    document.getElementById("msgs").innerHTML+=`<div>${d.message.content}</div>`;
  };
}

initChat();
</script>

</body>
</html>
