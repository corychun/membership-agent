<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购买会员</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f7fb;
  margin: 0;
  padding: 40px 16px;
}

.container {
  max-width: 520px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
}

label {
  display: block;
  margin: 14px 0 6px;
  font-weight: 600;
}

select, input, button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

button {
  background: #0f172a;
  color: #fff;
  margin-top: 16px;
  cursor: pointer;
}

.qr-box {
  margin-top: 16px;
  text-align: center;
  background: #f3f4f6;
  padding: 16px;
  border-radius: 12px;
}

.small {
  font-size: 13px;
  color: #666;
}

#status {
  margin-top: 16px;
  padding: 12px;
  background: #f3f4f6;
  border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">

<h2>购买会员</h2>

<label>选择产品</label>
<select id="product">
  <option value="GPT">GPT</option>
  <option value="CLAUDE">Claude</option>
  <option value="VIP">VIP</option>
  <option value="MJ">MJ</option>
</select>

<!-- 💰 价格 -->
<div id="priceBox" style="margin-top:6px;color:#555;">
  价格：¥10
</div>

<!-- 📦 库存 -->
<div id="stockBox" style="margin-top:4px;color:#16a34a;">
  库存剩余：加载中...
</div>

<label>邮箱</label>
<input id="email" placeholder="输入你的邮箱" />

<label>支付方式</label>
<select id="payMethod">
  <option value="wechat">微信支付</option>
  <option value="alipay">支付宝</option>
</select>

<div class="qr-box">
  <div style="margin-bottom:8px;font-weight:600;">扫码支付</div>
  <img id="qrcodeImg" src="/static/qrcodes/wechat.png" style="width:220px;" />
</div>

<button onclick="createOrder()">立即购买</button>

<div id="status">等待操作...</div>

<div class="small">
  扫码付款后，请保留订单号，等待后台确认自动发货
</div>

</div>

<script>
const API_BASE = "";

// 💰 价格表
const PRICE_MAP = {
  GPT: 180,
  CLAUDE: 220,
  VIP: 20,
  MJ: 15
};

// 🔁 切换二维码
document.getElementById("payMethod").addEventListener("change", (e) => {
  const img = document.getElementById("qrcodeImg");
  img.src = e.target.value === "wechat"
    ? "/static/qrcodes/wechat.png"
    : "/static/qrcodes/alipay.png";
});

// 🔁 产品切换
const productSelect = document.getElementById("product");

productSelect.addEventListener("change", () => {
  updatePrice();
  loadStock();
});

// 💰 更新价格
function updatePrice() {
  const p = productSelect.value;
  document.getElementById("priceBox").innerText =
    "价格：¥" + (PRICE_MAP[p] || 0);
}

// 📦 获取库存
async function loadStock() {
  const p = productSelect.value;

  try {
    const res = await fetch(API_BASE + "/inventory/stats");
    const data = await res.json();

    const item = data.items.find(i => i.product_code === p);

    document.getElementById("stockBox").innerText =
      "库存剩余：" + (item ? item.available : 0);
  } catch {
    document.getElementById("stockBox").innerText = "库存获取失败";
  }
}

// 🧾 创建订单
async function createOrder() {
  const product = document.getElementById("product").value;
  const email = document.getElementById("email").value;
  const statusBox = document.getElementById("status");

  if (!email) {
    alert("请输入邮箱");
    return;
  }

  statusBox.innerText = "创建订单中...";

  try {
    const res = await fetch(API_BASE + "/orders/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        product_code: product,
        email: email
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "下单失败");
    }

    // ✅ 下单成功提示
    statusBox.innerHTML = `
      <div style="color:#333;">
        订单号：<b>${data.order_no}</b><br/><br/>
        💰 请扫码付款并备注订单号<br/>
        📩 付款后后台确认自动发货<br/><br/>
        ⏳ 请勿关闭页面
      </div>
    `;

  } catch (e) {
    statusBox.innerText = "❌ " + e.message;
  }
}

// 初始化
updatePrice();
loadStock();
</script>

</body>
</html>
