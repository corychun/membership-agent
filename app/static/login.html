<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台登录</title>

<style>
body {
  font-family: Arial;
  background: #f6f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #111827;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h3>后台登录</h3>

  <input id="username" placeholder="账号" />
  <input id="password" type="password" placeholder="密码" />

  <button onclick="login()">登录</button>

  <div id="msg"></div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/admin/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("admin_login", "1");
    window.location.href = "/static/admin.html";
  } else {
    document.getElementById("msg").innerText = data.detail || "登录失败";
  }
}
</script>

</body>
</html>
