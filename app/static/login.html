<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台登录</title>
<style>
body{font-family:Arial;background:#f6f7fb;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;color:#111827}.box{background:#fff;padding:30px;border-radius:14px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,.1)}input,button{width:100%;padding:12px;margin-top:12px;border-radius:8px;box-sizing:border-box;font-size:14px}input{border:1px solid #d1d5db}button{border:none;background:#111827;color:#fff;cursor:pointer;font-weight:700}.muted{color:#6b7280;font-size:13px}.err{color:#b91c1c;margin-top:10px;font-size:14px}
</style>
</head>
<body>
<div class="box">
  <h3>后台登录</h3>
  <p class="muted">使用管理员账号登录，登录后系统会保存 Token，不再保存明文密码。</p>
  <input id="username" placeholder="账号" autocomplete="username" />
  <input id="password" type="password" placeholder="密码" autocomplete="current-password" />
  <button onclick="login()">登录</button>
  <div id="msg" class="err"></div>
</div>
<script>
const API_BASE = window.location.origin;
async function parseJsonSafe(res){ const text = await res.text(); try{return text?JSON.parse(text):{}}catch{return {raw:text}} }
function getError(data){ return typeof data?.detail === "string" ? data.detail : (data?.raw || "登录失败"); }
async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");
  msg.innerText = "";
  if(!username || !password){ msg.innerText = "请输入账号和密码"; return; }
  const res = await fetch(`${API_BASE}/admin/login`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username,password})});
  const data = await parseJsonSafe(res);
  if(res.ok && data.access_token){
    localStorage.setItem("admin_token", data.access_token);
    localStorage.setItem("admin_info", JSON.stringify(data.admin || {}));
    localStorage.removeItem("admin_password");
    window.location.href = "/static/admin.html?v=" + Date.now();
  }else{
    msg.innerText = getError(data);
  }
}
document.addEventListener("keydown", e => { if(e.key === "Enter") login(); });
</script>
</body>
</html>
