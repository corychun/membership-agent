<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理</title>
<style>
body{font-family:Arial;padding:24px;background:#f5f6fa;color:#0f172a}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
button{background:#0f172a;color:#fff;border:0;border-radius:8px;padding:9px 14px;cursor:pointer;font-weight:700}
button.gray{background:#9ca3af}button.red{background:#b91c1c}button.green{background:#047857}
input,select,textarea{padding:9px 10px;border:1px solid #d1d5db;border-radius:8px}
textarea{width:100%;min-height:110px;box-sizing:border-box}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}
th{background:#f3f4f6}.ok{color:#047857;font-weight:700}.warn{color:#b45309;font-weight:700}.danger{color:#b91c1c;font-weight:700}.need{background:#fff7ed}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stock{border:1px solid #e5e7eb;border-radius:12px;padding:14px;background:#f9fafb}
.hidden{display:none}.nav button{margin-right:8px;margin-bottom:8px}
.support-layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
.support-session{padding:12px;border-bottom:1px solid #e5e7eb;cursor:pointer;background:#fff}
.support-session.closed{background:#f3f4f6;color:#6b7280}.support-session.active{background:#eef2ff;border-left:4px solid #6366f1}
.badge{background:#ef4444;color:#fff;border-radius:999px;padding:2px 7px;font-size:12px}
.chat-box{height:420px;overflow:auto;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px}
.msg-row{margin:8px 0}.msg-row.admin{text-align:right}
.msg-bubble{display:inline-block;max-width:75%;padding:9px 11px;border-radius:12px;text-align:left;word-break:break-word}
.msg-bubble.admin{background:#111827;color:#fff}.msg-bubble.customer{background:#fff;color:#111827;border:1px solid #e5e7eb}.msg-bubble.system{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
@media(max-width:900px){.grid{grid-template-columns:1fr}.support-layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <h2>后台管理</h2>
  <div id="meBox"></div>
  <div class="nav" style="margin-top:14px;">
    <button onclick="showTab('orders')">订单管理</button>
    <button onclick="showTab('inventory')">库存管理</button>
    <button onclick="showTab('query')">用户订单查询</button>
    <button onclick="showTab('support')">实时客服 <span id="supportUnreadBadge"></span></button>
    <button id="adminTabBtn" onclick="showTab('admins')">多管理员系统</button>
    <button class="gray" onclick="logout()">退出登录</button>
  </div>
</div>

<div class="card tab" id="tab-orders">
  <h3>订单管理</h3>
  <div class="toolbar">
    <button onclick="loadOrders()">刷新订单</button>
    <button onclick="selectPending()">选择待处理订单</button>
    <button onclick="batchConfirm()">批量确认收款并发货</button>
    <input id="searchInput" placeholder="搜索订单号 / 邮箱 / 产品" oninput="renderOrders()">
    <select id="statusFilter" onchange="renderOrders()"><option value="">全部订单</option><option value="pending">待处理</option><option value="paid">已支付</option><option value="delivered">已发货</option></select>
  </div>
  <table><thead><tr><th><input type="checkbox" onclick="toggleAll(this)"></th><th>订单号</th><th>邮箱</th><th>产品套餐</th><th>订单状态</th><th>支付状态</th><th>发货状态</th><th>发货内容</th><th>时间</th><th>操作</th></tr></thead><tbody id="orderBody"></tbody></table>
  <div id="statusBox" style="margin-top:14px;"></div>
</div>

<div class="card tab hidden" id="tab-inventory">
  <h3>库存余量</h3>
  <div class="toolbar"><button onclick="loadInventory()">刷新库存</button></div>
  <div class="grid" id="stockGrid"></div>
  <h3 style="margin-top:24px;">添加库存</h3>
  <div class="toolbar">
    <select id="addProduct"><option value="GPT_SHARED_1M">ChatGPT - ChatGPT Plus 共享版（1个月 / ¥88）</option>
<option value="GPT_PLUS_1M">ChatGPT - ChatGPT Plus 独享版（1个月 / ¥180）</option>
<option value="GPT_PLUS_3M">ChatGPT - ChatGPT Plus 季卡（3个月 / ¥499）</option>
<option value="GPT_TEAM_1M">ChatGPT - ChatGPT Team 席位（1个月 / ¥220）</option>
<option value="CLAUDE_SHARED_1M">Claude - Claude Pro 共享版（1个月 / ¥98）</option>
<option value="CLAUDE_PRO_1M">Claude - Claude Pro 独享版（1个月 / ¥200）</option>
<option value="CLAUDE_PRO_3M">Claude - Claude Pro 季卡（3个月 / ¥560）</option>
<option value="MJ_BASIC_1M">Midjourney - Midjourney Basic（1个月 / ¥120）</option>
<option value="MJ_STANDARD_1M">Midjourney - Midjourney Standard（1个月 / ¥180）</option>
<option value="MJ_PRO_1M">Midjourney - Midjourney Pro（1个月 / ¥300）</option>
<option value="GEMINI_PRO_1M">更多AI工具 - Gemini Advanced（1个月 / ¥99）</option>
<option value="PERPLEXITY_PRO_1M">更多AI工具 - Perplexity Pro（1个月 / ¥120）</option>
<option value="CURSOR_PRO_1M">更多AI工具 - Cursor Pro（1个月 / ¥150）</option>
<option value="AI_BUNDLE_1M">组合套餐 - AI全家桶月卡（1个月 / ¥300）</option></select>
    <button onclick="addInventory()">添加库存</button>
  </div>
  <textarea id="addCodes" placeholder="一行一个卡密，例如：&#10;账号----密码----备注&#10;账号2----密码2----备注"></textarea>
  <div id="inventoryMsg" style="margin-top:12px;"></div>
  <h3 style="margin-top:24px;">最近库存明细</h3>
  <table><thead><tr><th>ID</th><th>产品套餐</th><th>内容</th><th>状态</th></tr></thead><tbody id="inventoryBody"></tbody></table>
</div>

<div class="card tab hidden" id="tab-query">
  <h3>用户订单查询</h3>
  <div class="toolbar"><input id="queryOrderNo" placeholder="输入订单号，例如 ORD-XXXX"><button onclick="queryOrder()">查询</button></div>
  <div id="queryResult">请输入订单号查询。</div>
</div>

<div class="card tab hidden" id="tab-support">
  <h3>实时客服</h3>
  <div class="support-layout">
    <div><div class="toolbar"><button onclick="loadSupportSessions()">刷新会话</button></div><div id="supportSessionList" style="border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">加载中...</div></div>
    <div><div id="supportCurrentTitle" style="font-weight:700;margin-bottom:10px;">请选择一个会话</div><div id="supportAdminMessages" class="chat-box"></div><div style="display:flex;gap:8px;margin-top:10px;"><input id="supportAdminInput" placeholder="输入回复内容..." onkeydown="if(event.key==='Enter')sendAdminSupportMessage()" style="flex:1;"><button onclick="sendAdminSupportMessage()">发送</button><button class="red" onclick="closeSupportSession()">关闭会话</button></div></div>
  </div>
</div>

<div class="card tab hidden" id="tab-admins">
  <h3>多管理员系统</h3>
  <h4>创建管理员</h4>
  <div class="toolbar"><input id="newAdminUsername" placeholder="管理员账号"><input id="newAdminPassword" placeholder="密码" type="password"><select id="newAdminRole"><option value="support">support / 客服</option><option value="manager">manager / 订单库存客服</option><option value="super_admin">super_admin / 超级管理员</option></select><button onclick="createAdmin()">创建管理员</button></div>
  <div id="adminMsg"></div>
  <h4>管理员列表</h4>
  <table><thead><tr><th>ID</th><th>账号</th><th>角色</th><th>状态</th><th>最后登录</th><th>操作</th></tr></thead><tbody id="adminBody"></tbody></table>
</div>

<script>
const PRODUCT_CATALOG = [{"code": "GPT_SHARED_1M", "category": "ChatGPT", "name": "ChatGPT Plus 共享版", "price": 88, "period": "1个月", "badge": "入门推荐", "desc": "适合轻度使用，性价比高。"}, {"code": "GPT_PLUS_1M", "category": "ChatGPT", "name": "ChatGPT Plus 独享版", "price": 180, "period": "1个月", "badge": "热门", "desc": "独享账号，适合稳定办公、学习、写作。"}, {"code": "GPT_PLUS_3M", "category": "ChatGPT", "name": "ChatGPT Plus 季卡", "price": 499, "period": "3个月", "badge": "更划算", "desc": "长期使用更省心，适合稳定需求。"}, {"code": "GPT_TEAM_1M", "category": "ChatGPT", "name": "ChatGPT Team 席位", "price": 220, "period": "1个月", "badge": "团队版", "desc": "适合团队协作和高频使用。"}, {"code": "CLAUDE_SHARED_1M", "category": "Claude", "name": "Claude Pro 共享版", "price": 98, "period": "1个月", "badge": "长文入门", "desc": "适合文档阅读、总结和写作体验。"}, {"code": "CLAUDE_PRO_1M", "category": "Claude", "name": "Claude Pro 独享版", "price": 200, "period": "1个月", "badge": "长文推荐", "desc": "适合论文、长文、报告、内容处理。"}, {"code": "CLAUDE_PRO_3M", "category": "Claude", "name": "Claude Pro 季卡", "price": 560, "period": "3个月", "badge": "稳定长期", "desc": "长期长文处理需求，减少续费麻烦。"}, {"code": "MJ_BASIC_1M", "category": "Midjourney", "name": "Midjourney Basic", "price": 120, "period": "1个月", "badge": "AI绘画入门", "desc": "适合低频出图和基础设计。"}, {"code": "MJ_STANDARD_1M", "category": "Midjourney", "name": "Midjourney Standard", "price": 180, "period": "1个月", "badge": "绘画推荐", "desc": "适合设计素材、海报、创意图。"}, {"code": "MJ_PRO_1M", "category": "Midjourney", "name": "Midjourney Pro", "price": 300, "period": "1个月", "badge": "高频创作", "desc": "适合设计师和高频出图用户。"}, {"code": "GEMINI_PRO_1M", "category": "更多AI工具", "name": "Gemini Advanced", "price": 99, "period": "1个月", "badge": "Google AI", "desc": "适合多模态和搜索增强使用。"}, {"code": "PERPLEXITY_PRO_1M", "category": "更多AI工具", "name": "Perplexity Pro", "price": 120, "period": "1个月", "badge": "搜索问答", "desc": "适合资料检索、论文搜索、研究。"}, {"code": "CURSOR_PRO_1M", "category": "更多AI工具", "name": "Cursor Pro", "price": 150, "period": "1个月", "badge": "编程助手", "desc": "适合程序员 AI 编程开发。"}, {"code": "AI_BUNDLE_1M", "category": "组合套餐", "name": "AI全家桶月卡", "price": 300, "period": "1个月", "badge": "组合优惠", "desc": "ChatGPT / Claude / MJ 等组合套餐。"}];
const PRODUCT_NAME = Object.fromEntries(PRODUCT_CATALOG.map(p => [p.code, `${p.category} - ${p.name}`]));
const token = localStorage.getItem("admin_token") || localStorage.getItem("token");
if(!token) location.href="/static/login.html";
let currentAdmin=null, orders=[], supportSessions=[], activeSupportSessionNo="", adminSupportSocket=null;

function authHeaders(){return {"Content-Type":"application/json","Authorization":"Bearer "+token}}
function logout(){localStorage.removeItem("admin_token");localStorage.removeItem("token");location.href="/static/login.html"}
function showTab(name){document.querySelectorAll(".tab").forEach(x=>x.classList.add("hidden"));document.getElementById("tab-"+name).classList.remove("hidden");if(name==="orders")loadOrders();if(name==="inventory")loadInventory();if(name==="admins")loadAdmins();if(name==="support")loadSupportSessions();}
function escapeHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
function productName(code){return PRODUCT_NAME[code] || code || "-"}
function statusClass(v){v=String(v||"").toLowerCase();if(["paid","completed","delivered","success"].includes(v))return"ok";if(["pending","pending_payment","waiting","unpaid"].includes(v))return"warn";return"danger"}
function canConfirm(o){if(o.can_confirm===true)return true;const d=String(o.delivery_status||"").toLowerCase();return !["delivered","completed","success","sent"].includes(d)}

async function checkMe(){try{const res=await fetch("/admin/me",{headers:authHeaders()});if(res.status===401||res.status===403){logout();return}const data=await res.json();currentAdmin=data.admin;document.getElementById("meBox").innerHTML=`当前管理员：<b>${escapeHtml(currentAdmin.username)}</b> / ${escapeHtml(currentAdmin.role)}`;if(currentAdmin.role!=="super_admin")document.getElementById("adminTabBtn").style.display="none";}catch(e){document.getElementById("meBox").innerHTML=`<span class="danger">登录状态检查失败</span>`}}

async function loadOrders(){const body=document.getElementById("orderBody");body.innerHTML=`<tr><td colspan="10">加载中...</td></tr>`;try{const res=await fetch("/admin/orders",{headers:authHeaders()});if(res.status===401||res.status===403){logout();return}const data=await res.json();orders=Array.isArray(data)?data:(data.items||[]);renderOrders();}catch(e){body.innerHTML=`<tr><td colspan="10" class="danger">加载失败：${escapeHtml(e.message)}</td></tr>`}}

function renderOrders(){const keyword=document.getElementById("searchInput").value.trim().toLowerCase(), filter=document.getElementById("statusFilter").value, body=document.getElementById("orderBody");let list=orders.filter(o=>{const text=`${o.order_no||""} ${o.customer_email||""} ${o.product_code||""} ${productName(o.product_code)}`.toLowerCase();if(keyword&&!text.includes(keyword))return false;if(filter==="pending")return canConfirm(o);if(filter==="paid")return String(o.payment_status||"").toLowerCase()==="paid";if(filter==="delivered")return String(o.delivery_status||"").toLowerCase()==="delivered";return true;});if(!list.length){body.innerHTML=`<tr><td colspan="10">暂无订单</td></tr>`;return}body.innerHTML=list.map(o=>{const disabled=canConfirm(o)?"":"disabled";const btn=canConfirm(o)?`<button onclick="confirmOne('${escapeHtml(o.order_no)}')">确认收款并发货</button>`:`<button class="gray" disabled>已发货</button>`;return `<tr class="${canConfirm(o)?"need":""}"><td><input type="checkbox" class="orderCheck" value="${escapeHtml(o.order_no||"")}" ${disabled}></td><td>${escapeHtml(o.order_no||"-")} <button class="gray" onclick="copyText('${escapeHtml(o.order_no||"")}')">复制</button></td><td>${escapeHtml(o.customer_email||"-")} <button class="gray" onclick="copyText('${escapeHtml(o.customer_email||"")}')">复制</button></td><td>${escapeHtml(productName(o.product_code))}<br><small>${escapeHtml(o.product_code||"-")}</small></td><td class="${statusClass(o.status)}">${escapeHtml(o.status||"-")}</td><td class="${statusClass(o.payment_status)}">${escapeHtml(o.payment_status||"-")}</td><td class="${statusClass(o.delivery_status)}">${escapeHtml(o.delivery_status||"-")}</td><td>${escapeHtml(o.delivery_content||"-")}</td><td>${escapeHtml(o.created_at||"-")}</td><td>${btn}</td></tr>`;}).join("");}

async function confirmOne(orderNo){if(!confirm("确认收款并发货："+orderNo+" ?"))return;const res=await fetch("/admin/orders/confirm-paid",{method:"POST",headers:authHeaders(),body:JSON.stringify({order_no:orderNo})});const data=await res.json();if(!res.ok){alert(data.detail||"处理失败");return}alert("处理成功");loadOrders()}
async function batchConfirm(){const ids=Array.from(document.querySelectorAll(".orderCheck:checked")).map(i=>i.value);if(!ids.length){alert("请选择订单");return}if(!confirm(`确认批量处理 ${ids.length} 个订单？`))return;const res=await fetch("/admin/orders/confirm-paid-bulk",{method:"POST",headers:authHeaders(),body:JSON.stringify({order_nos:ids})});const data=await res.json();if(!res.ok){alert(data.detail||"批量处理失败");return}document.getElementById("statusBox").innerHTML=`<span class="ok">成功：${data.success_count}</span>，<span class="danger">失败：${data.failed_count}</span>`;loadOrders()}
function toggleAll(el){document.querySelectorAll(".orderCheck:not(:disabled)").forEach(i=>i.checked=el.checked)}function selectPending(){document.querySelectorAll(".orderCheck").forEach(i=>i.checked=!i.disabled)}

async function loadInventory(){try{const statsRes=await fetch("/inventory/stats"), stats=await statsRes.json();document.getElementById("stockGrid").innerHTML=(stats.items||[]).map(i=>`<div class="stock"><b>${escapeHtml(productName(i.product_code))}</b><br><small>${escapeHtml(i.product_code)}</small><br>可用：<span class="ok">${escapeHtml(i.available)}</span><br>总数：${escapeHtml(i.total)}<br>已用：${escapeHtml(i.used)}</div>`).join("");const listRes=await fetch("/inventory/list",{headers:authHeaders()}), list=await listRes.json();document.getElementById("inventoryBody").innerHTML=(list.items||[]).map(i=>`<tr><td>${escapeHtml(i.id)}</td><td>${escapeHtml(productName(i.product_code))}<br><small>${escapeHtml(i.product_code)}</small></td><td>${escapeHtml(i.content||i.code||"")}</td><td class="${i.status==='available'?'ok':'warn'}">${escapeHtml(i.status||(i.is_used?"used":"available"))}</td></tr>`).join("")||`<tr><td colspan="4">暂无库存</td></tr>`;}catch(e){document.getElementById("inventoryMsg").innerHTML=`<span class="danger">库存加载失败：${escapeHtml(e.message)}</span>`}}
async function addInventory(){const product=document.getElementById("addProduct").value, codes=document.getElementById("addCodes").value;if(!codes.trim()){alert("请输入库存内容");return}const res=await fetch("/inventory/add",{method:"POST",headers:authHeaders(),body:JSON.stringify({product_code:product,codes})});const data=await res.json();if(!res.ok){document.getElementById("inventoryMsg").innerHTML=`<span class="danger">${escapeHtml(data.detail||"添加失败")}</span>`;return}document.getElementById("inventoryMsg").innerHTML=`<span class="ok">添加成功：${escapeHtml(data.inserted||data.count||0)} 条</span>`;document.getElementById("addCodes").value="";loadInventory()}

async function queryOrder(){const orderNo=document.getElementById("queryOrderNo").value.trim();if(!orderNo){alert("请输入订单号");return}let found=orders.find(o=>o.order_no===orderNo);if(!found){await loadOrders();found=orders.find(o=>o.order_no===orderNo)}if(!found){document.getElementById("queryResult").innerHTML=`<span class="danger">未找到订单</span>`;return}document.getElementById("queryResult").innerHTML=`<div class="stock">订单号：${escapeHtml(found.order_no)}<br>邮箱：${escapeHtml(found.customer_email)}<br>套餐：${escapeHtml(productName(found.product_code))}<br>订单状态：${escapeHtml(found.status)}<br>支付状态：${escapeHtml(found.payment_status)}<br>发货状态：${escapeHtml(found.delivery_status)}<br>发货内容：${escapeHtml(found.delivery_content||"-")}</div>`}

async function loadAdmins(){if(!currentAdmin||currentAdmin.role!=="super_admin")return;const res=await fetch("/admin/admins",{headers:authHeaders()}),data=await res.json();if(!res.ok){document.getElementById("adminMsg").innerHTML=`<span class="danger">${escapeHtml(data.detail||"加载失败")}</span>`;return}document.getElementById("adminBody").innerHTML=(data.items||[]).map(a=>`<tr><td>${escapeHtml(a.id)}</td><td>${escapeHtml(a.username)}</td><td><select id="role_${a.id}"><option value="support" ${a.role==="support"?"selected":""}>support</option><option value="manager" ${a.role==="manager"?"selected":""}>manager</option><option value="super_admin" ${a.role==="super_admin"?"selected":""}>super_admin</option></select></td><td>${a.is_active?'<span class="ok">启用</span>':'<span class="danger">禁用</span>'}</td><td>${escapeHtml(a.last_login_at||"-")}</td><td><input id="pwd_${a.id}" placeholder="新密码，可空" type="password"><button onclick="updateAdmin(${a.id})">保存</button><button class="${a.is_active?'red':'green'}" onclick="toggleAdmin(${a.id}, ${a.is_active?0:1})">${a.is_active?'禁用':'启用'}</button></td></tr>`).join("")}
async function createAdmin(){const username=document.getElementById("newAdminUsername").value.trim(),password=document.getElementById("newAdminPassword").value,role=document.getElementById("newAdminRole").value;if(!username||!password){alert("请输入账号和密码");return}const res=await fetch("/admin/admins",{method:"POST",headers:authHeaders(),body:JSON.stringify({username,password,role})});const data=await res.json();if(!res.ok){document.getElementById("adminMsg").innerHTML=`<span class="danger">${escapeHtml(data.detail||"创建失败")}</span>`;return}document.getElementById("adminMsg").innerHTML=`<span class="ok">创建成功</span>`;document.getElementById("newAdminUsername").value="";document.getElementById("newAdminPassword").value="";loadAdmins()}
async function updateAdmin(id){const role=document.getElementById("role_"+id).value,password=document.getElementById("pwd_"+id).value,body={role};if(password)body.password=password;const res=await fetch("/admin/admins/"+id,{method:"PUT",headers:authHeaders(),body:JSON.stringify(body)}),data=await res.json();if(!res.ok){alert(data.detail||"保存失败");return}alert("保存成功");loadAdmins()}
async function toggleAdmin(id,active){const res=await fetch("/admin/admins/"+id,{method:"PUT",headers:authHeaders(),body:JSON.stringify({is_active:!!active})}),data=await res.json();if(!res.ok){alert(data.detail||"操作失败");return}loadAdmins()}

async function loadSupportSessions(){const box=document.getElementById("supportSessionList");if(!box)return;box.innerHTML="加载中...";try{const res=await fetch("/support/admin/sessions",{headers:authHeaders()}),data=await res.json();if(!res.ok){box.innerHTML=`<div style="padding:12px;color:#b91c1c;">${escapeHtml(data.detail||"加载失败")}</div>`;return}supportSessions=data.items||[];updateSupportUnreadBadge();if(!supportSessions.length){box.innerHTML=`<div style="padding:12px;">暂无客服会话</div>`;return}box.innerHTML=supportSessions.map(s=>`<div onclick="openAdminSupportSession('${escapeHtml(s.session_no)}')" class="support-session ${s.status==='closed'?'closed':''} ${activeSupportSessionNo===s.session_no?'active':''}"><b>${escapeHtml(s.session_no)}</b> ${s.unread_count>0?`<span class="badge">${escapeHtml(s.unread_count)}</span>`:""}<br><small>邮箱：${escapeHtml(s.customer_email||"-")}</small><br><small>订单：${escapeHtml(s.order_no||"-")}</small><br><small>状态：${escapeHtml(s.status)}</small></div>`).join("");}catch(e){box.innerHTML=`<div style="padding:12px;color:#b91c1c;">${escapeHtml(e.message)}</div>`}}
function updateSupportUnreadBadge(){const total=(supportSessions||[]).reduce((sum,s)=>sum+(Number(s.unread_count)||0),0),el=document.getElementById("supportUnreadBadge");if(el)el.innerHTML=total>0?`<span class="badge">${total}</span>`:""}
async function openAdminSupportSession(sessionNo){activeSupportSessionNo=sessionNo;const title=document.getElementById("supportCurrentTitle"),msgBox=document.getElementById("supportAdminMessages");title.innerText="当前会话："+sessionNo;msgBox.innerHTML="加载消息中...";try{const res=await fetch(`/support/admin/sessions/${encodeURIComponent(sessionNo)}/messages`,{headers:authHeaders()}),data=await res.json();if(!res.ok){msgBox.innerHTML=`<span class="danger">${escapeHtml(data.detail||"加载失败")}</span>`;return}msgBox.innerHTML="";(data.items||[]).forEach(m=>appendAdminSupportMessage(m.sender_type,m.sender_name,m.content));connectAdminSupportSocket(sessionNo);loadSupportSessions();}catch(e){msgBox.innerHTML=`<span class="danger">${escapeHtml(e.message)}</span>`}}
function appendAdminSupportMessage(senderType,senderName,content){const box=document.getElementById("supportAdminMessages");if(!box)return;const div=document.createElement("div");div.className="msg-row "+(senderType==="admin"?"admin":"");let bubbleClass="customer";if(senderType==="admin")bubbleClass="admin";if(senderType==="system")bubbleClass="system";div.innerHTML=`<div class="msg-bubble ${bubbleClass}"><div style="font-size:12px;opacity:.75;margin-bottom:4px;">${escapeHtml(senderName||senderType)}</div><div>${escapeHtml(content||"")}</div></div>`;box.appendChild(div);box.scrollTop=box.scrollHeight}
function connectAdminSupportSocket(sessionNo){if(adminSupportSocket){try{adminSupportSocket.close()}catch(e){}}const protocol=location.protocol==="https:"?"wss":"ws";adminSupportSocket=new WebSocket(`${protocol}://${location.host}/ws/support/admin/${encodeURIComponent(sessionNo)}?token=${encodeURIComponent(token)}`);adminSupportSocket.onmessage=event=>{const data=JSON.parse(event.data);if(data.type==="message"&&data.message){appendAdminSupportMessage(data.message.sender_type,data.message.sender_name,data.message.content);loadSupportSessions()}if(data.type==="error")alert(data.message||"客服连接错误")};adminSupportSocket.onclose=()=>{}}
function sendAdminSupportMessage(){const input=document.getElementById("supportAdminInput"),content=input.value.trim();if(!activeSupportSessionNo){alert("请先选择一个客服会话");return}if(!content)return;if(!adminSupportSocket||adminSupportSocket.readyState!==WebSocket.OPEN){alert("客服连接未建立，请重新点一下会话");return}adminSupportSocket.send(JSON.stringify({content}));input.value=""}
async function closeSupportSession(){if(!activeSupportSessionNo){alert("请先选择会话");return}if(!confirm("确认关闭该客服会话？"))return;const res=await fetch(`/support/admin/sessions/${encodeURIComponent(activeSupportSessionNo)}/close`,{method:"POST",headers:authHeaders()}),data=await res.json();if(!res.ok){alert(data.detail||"关闭失败");return}alert("已关闭");loadSupportSessions();openAdminSupportSession(activeSupportSessionNo)}
function copyText(t){navigator.clipboard.writeText(t);alert("已复制："+t)}

checkMe();loadOrders();loadSupportSessions();
setInterval(()=>{if(!document.getElementById("tab-orders").classList.contains("hidden"))loadOrders();loadSupportSessions()},10000);
</script>
</body>
