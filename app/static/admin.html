<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理</title>

<style>
body { font-family: Arial; padding:20px; }

table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

.pending { background:#fff7ed; }
.need-action { background:#fef2f2; }

button {
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>订单管理</h2>

<button onclick="batchPay()">批量确认收款</button>

<table id="table">
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>订单号</th>
<th>邮箱</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>
const API = "/admin/orders";

let orders = [];

/* 加载订单 */
async function load(){
  const res = await fetch(API);
  orders = await res.json();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  orders.forEach(o=>{
    const tr = document.createElement("tr");

    if(o.payment_status === "pending"){
      tr.classList.add("need-action");
    }

    tr.innerHTML = `
      <td><input type="checkbox" value="${o.order_no}"></td>
      <td>${o.order_no}</td>
      <td>${o.customer_email}</td>
      <td>${o.payment_status}</td>
      <td>
        ${o.payment_status === "pending"
          ? `<button onclick="pay('${o.order_no}')">确认收款</button>`
          : "已完成"}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* 单个 */
async function pay(id){
  await fetch("/admin/orders/batch_pay",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify([id])
  });

  load();
}

/* 批量 */
async function batchPay(){
  const checked = document.querySelectorAll("tbody input:checked");

  const ids = Array.from(checked).map(i=>i.value);

  if(ids.length===0){
    alert("请选择订单");
    return;
  }

  await fetch("/admin/orders/batch_pay",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(ids)
  });

  load();
}

/* 全选 */
function toggleAll(el){
  document.querySelectorAll("tbody input").forEach(i=>{
    i.checked = el.checked;
  });
}

/* 自动刷新 */
setInterval(load,10000);

load();
</script>

</body>
</html>
