<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
button{padding:8px 12px;border:none;border-radius:6px;background:#111;color:#fff;cursor:pointer}
input,select{padding:8px;border:1px solid #ddd;border-radius:6px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
.ok{color:green}
.warn{color:orange}
.danger{color:red}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
  <h2>后台管理</h2>
  <div id="adminInfo"></div>

  <button onclick="showTab('orders')">订单</button>
  <button onclick="showTab('inventory')">库存</button>
  <button onclick="showTab('admins')">管理员</button>
  <button onclick="showTab('support')">客服</button>
  <button onclick="logout()">退出</button>
</div>

<!-- 订单 -->
<div id="tab-orders" class="card">
  <h3>订单管理</h3>
  <button onclick="loadOrders()">刷新</button>

  <table>
    <thead>
      <tr>
        <th>订单号</th>
        <th>邮箱</th>
        <th>产品</th>
        <th>支付</th>
        <th>发货</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="orderBody"></tbody>
  </table>
</div>

<!-- 库存 -->
<div id="tab-inventory" class="card hidden">
  <h3>库存管理</h3>

  <select id="product">
    <option value="GPT">GPT</option>
    <option value="CLAUDE">CLAUDE</option>
  </select>

  <textarea id="codes" placeholder="一行一个卡密" style="width:100%;height:100px"></textarea>

  <button onclick="addInventory()">添加库存</button>

  <div id="inventoryMsg"></div>
</div>

<!-- 管理员 -->
<div id="tab-admins" class="card hidden">
  <h3>多管理员</h3>

  <input id="newUser" placeholder="账号">
  <input id="newPass" placeholder="密码">
  <select id="newRole">
    <option value="support">客服</option>
    <option value="manager">经理</option>
    <option value="super_admin">超级管理员</option>
  </select>

  <button onclick="createAdmin()">创建</button>

  <table>
    <tbody id="adminBody"></tbody>
  </table>
</div>

<!-- 客服 -->
<div id="tab-support" class="card hidden">
  <h3>客服系统</h3>
  <div id="sessions"></div>

  <div id="chatBox" style="margin-top:10px">
    <div id="msgs" style="height:200px;overflow:auto;background:#f1f1f1"></div>
    <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
const token=localStorage.getItem("admin_token");
if(!token) location.href="/static/login.html";

function auth(){
  return {"Authorization":"Bearer "+token};
}

function logout(){
  localStorage.removeItem("admin_token");
  location.href="/static/login.html";
}

function showTab(name){
  document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
  document.getElementById("tab-"+name).classList.remove("hidden");
}

async function loadOrders(){
  const res=await fetch("/admin/orders",{headers:auth()});
  const data=await res.json();

  document.getElementById("orderBody").innerHTML=data.map(o=>`
    <tr>
      <td>${o.order_no}</td>
      <td>${o.customer_email}</td>
      <td>${o.product_code}</td>
      <td>${o.payment_status}</td>
      <td>${o.delivery_status}</td>
      <td><button onclick="confirm('${o.order_no}')">发货</button></td>
    </tr>
  `).join("");
}

async function confirm(orderNo){
  await fetch("/admin/orders/confirm-paid",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      ...auth()
    },
    body:JSON.stringify({order_no:orderNo})
  });
  loadOrders();
}

async function addInventory(){
  const codes=document.getElementById("codes").value;

  await fetch("/inventory/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      ...auth()
    },
    body:JSON.stringify({
      product_code:document.getElementById("product").value,
      codes
    })
  });

  document.getElementById("inventoryMsg").innerText="添加成功";
}

async function createAdmin(){
  await fetch("/admin/admins",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      ...auth()
    },
    body:JSON.stringify({
      username:newUser.value,
      password:newPass.value,
      role:newRole.value
    })
  });
  alert("创建成功");
}

let ws;

async function loadSessions(){
  const res=await fetch("/support/admin/sessions",{headers:auth()});
  const data=await res.json();

  document.getElementById("sessions").innerHTML=data.items.map(s=>`
    <div onclick="openChat('${s.session_no}')">${s.session_no}</div>
  `).join("");
}

function openChat(no){
  ws=new WebSocket(`wss://${location.host}/ws/support/admin/${no}?token=${token}`);

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    document.getElementById("msgs").innerHTML+=`<div>${d.message.content}</div>`;
  };
}

function sendMsg(){
  const v=document.getElementById("msgInput").value;
  ws.send(JSON.stringify({content:v}));
}

loadOrders();
loadSessions();
</script>

</body>
</html>
